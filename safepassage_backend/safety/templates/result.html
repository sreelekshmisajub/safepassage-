<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePassage - Risk Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
            --low: #10b981;
            --medium: #f59e0b;
            --high: #ef4444;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 500px;
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: #333;
            text-align: center;
        }

        .risk-badge {
            font-size: 3rem;
            font-weight: 700;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: inline-block;
            width: 100%;
        }

        .risk-Low {
            background: var(--low);
            color: #fff;
        }

        .risk-Medium {
            background: var(--medium);
            color: #fff;
        }

        .risk-High {
            background: var(--high);
            color: #fff;
        }

        .score-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .btn-outline-primary {
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            background: var(--primary-blue);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card p-4">
            <h3 class="mb-2 text-primary fw-bold">Analysis for {{ location }}</h3>
            <p class="text-muted mb-4">Year: {{ year }} | Crime Value: {{ crime_value }}</p>

            <div class="risk-badge risk-{{ risk_label }}">
                {{ risk_label | upper }}
            </div>

            <div class="score-box">
                <p class="mb-1 text-muted">Risk Score</p>
                <h2 class="fw-bold mb-0">{{ risk_score }}%</h2>
            </div>

            <div class="mt-4">
                <a href="{% url 'risk_form' %}" class="btn btn-outline-primary w-100">Predict Another Location</a>
            </div>
        </div>
    </div>
</body>

</html>
